name: UniDeploy Auto-Fix PR

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reproduce the failure
        continue-on-error: true
        run: |
          pip install -r requirements.txt
          pytest -v 2>&1 | tee test-output.txt

      - name: UniDeploy fixes the bug
        uses: suryansh639/unideploy-action@v1
        with:
          api-key: ${{ secrets.UNIDEPLOY_API_KEY }}
          provider: amazon-bedrock
          region: us-east-1
          max-steps: "20"
          prompt: >
            Our CI tests are failing. Read the file test-output.txt to see which
            test failed. Then read cart.py, find the bug, and FIX it by editing
            cart.py directly with your file-editing tools. The function
            add_item_prices must SUM the prices. Also update or remove any code
            comment that is now inaccurate, so the final code reads cleanly with
            no leftover BUG notes. After editing, run pytest to confirm the tests
            pass. Apply the fix directly, do not ask for confirmation.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Verify the fix passes tests
        run: pytest -v

      - name: Open a pull request with UniDeploy's fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f test-output.txt unideploy-output.txt
          rm -rf .Unideploy __pycache__ .pytest_cache
          if git diff --quiet -- cart.py; then
            echo "UniDeploy made no change to cart.py."
            exit 1
          fi
          BRANCH="unideploy/auto-fix-$(date +%s)"
          git config user.name "UniDeploy Bot"
          git config user.email "bot@unideploy.com"
          git checkout -b "$BRANCH"
          git add cart.py
          git commit -m "fix: sum cart item prices instead of subtracting (auto-fixed by UniDeploy)"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: sum cart item prices instead of subtracting" \
            --body "## 🤖 Auto-fixed by UniDeploy

CI was failing because \`add_item_prices\` subtracted each price instead of adding it.

UniDeploy read the failing test, located the bug in \`cart.py\`, applied the fix, and re-ran the tests — they now pass. ✅

**Root cause:** arithmetic typo (\`-\` instead of \`+\`).
**Result:** \`add_item_prices([10, 20, 30])\` now correctly returns \`60\`." \
            --base main --head "$BRANCH"

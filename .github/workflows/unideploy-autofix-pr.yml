name: UniDeploy Auto-Fix PR

on:
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Reproduce the failure
        continue-on-error: true
        run: |
          pip install -r requirements.txt
          pytest -v 2>&1 | tee test-output.txt

      - name: UniDeploy fixes the bug
        uses: suryansh639/unideploy-action@v1
        with:
          api-key: ${{ secrets.UNIDEPLOY_API_KEY }}
          provider: amazon-bedrock
          region: us-east-1
          max-steps: "20"
          prompt: >
            Our CI tests are failing. Read the file test-output.txt to see which
            test failed. Then read cart.py, find the bug, and FIX it by editing
            cart.py directly with your file-editing tools. The function
            add_item_prices must SUM the prices. After editing, run pytest to
            confirm the tests pass. Apply the fix directly, do not ask for
            confirmation.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1

      - name: Verify the fix passes tests
        run: pytest -v

      - name: Open a pull request with UniDeploy's fix
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Keep the PR clean: only the real source fix, no build artifacts.
          rm -f test-output.txt unideploy-output.txt
          rm -rf .Unideploy __pycache__ .pytest_cache
          if git diff --quiet -- cart.py; then
            echo "UniDeploy made no change to cart.py."
            exit 1
          fi
          BRANCH="unideploy/auto-fix-$(date +%s)"
          git config user.name "UniDeploy Bot"
          git config user.email "bot@unideploy.com"
          git checkout -b "$BRANCH"
          git add cart.py
          git commit -m "fix: resolve failing CI test (auto-fixed by UniDeploy)"
          git push origin "$BRANCH"
          gh pr create \
            --title "fix: auto-fix failing CI test" \
            --body "This pull request was generated automatically by **UniDeploy** after CI failed. UniDeploy read the failing test, located the bug in cart.py, and applied the fix. Tests now pass. ✅" \
            --base main --head "$BRANCH"
